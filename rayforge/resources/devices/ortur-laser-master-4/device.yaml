api_version: 1
device:
  name: Ortur Laser Master 4
  description: Diode laser engraver with 400x400mm work area and high-speed capabilities
machine:
  driver: GrblSerialDriver
  driver_args:
    baudrate: '115200'
  gcode_precision: 3
  axis_extents:
  - 400.0
  - 400.0
  origin: bottom_left
  max_travel_speed: 20000
  max_cut_speed: 6000
  home_on_start: true
  heads:
  - max_power: 1000
    frame_power_percent: 1.0
    focus_power_percent: 1.0
    spot_size_mm:
    - 0.06
    - 0.06
