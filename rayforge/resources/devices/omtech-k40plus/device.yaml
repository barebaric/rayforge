api_version: 1
device:
  name: OMTech K40+
  description: CO2 laser cutter with 300x200mm work area
machine:
  driver: GrblSerialDriver
  gcode_precision: 3
  axis_extents:
  - 300.0
  - 200.0
  work_margins:
  - 5.0
  - 5.0
  - 5.0
  - 5.0
  origin: top_left
  max_travel_speed: 3000
  max_cut_speed: 18000
  home_on_start: true
  heads:
  - max_power: 1000
    frame_power_percent: 0.0
    focus_power_percent: 0.0
    spot_size_mm:
    - 0.1
    - 0.1
    laser_type: co2
    pwm_frequency: 1000
    max_pwm_frequency: 5000
    pulse_width: 50
    min_pulse_width: 5
    max_pulse_width: 500
