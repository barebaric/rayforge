name: Build Windows Executable
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cairo
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Install libvips
        run: |
          $vipsUrl = "https://github.com/libvips/build-win64/releases/download/v8.14.5/vips-dev-w64-all-8.14.5.zip"
          Invoke-WebRequest -Uri $vipsUrl -OutFile vips.zip
          Expand-Archive -Path vips.zip -DestinationPath C:\vips
          echo "C:\vips\bin" >> $env:GITHUB_PATH

      - name: Set Environment Paths
        run: |
          echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH
          echo "C:\msys64\ucrt64\bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyvips[binary]"
          pip install pycairo PyGObject numpy opencv-python pymupdf scipy
          pip install pyinstaller

      - name: Configure GTK Theme
        run: |
          mkdir -p etc/gtk-4.0
          echo "[Settings]" > etc/gtk-4.0/settings.ini
          echo "gtk-theme-name=Windows10" >> etc/gtk-4.0/settings.ini
          echo "gtk-font-name=Segoe UI 9" >> etc/gtk-4.0/settings.ini

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --add-data "C:/tools/msys64/mingw64/share/glib-2.0/schemas;glib-2.0/schemas" rayforge/app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rayforge-Installer
          path: dist/rayforge.exe
