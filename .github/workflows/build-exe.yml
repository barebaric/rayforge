name: Build Windows Executable
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cairo
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-adwaita-icon-theme

      - name: Verify GTK installation
        shell: msys2 {0}
        run: |
          ls -la /mingw64/share/glib-2.0/schemas
          gtk4-broadwayd --version

      - name: Install Python dependencies
        shell: bash
        run: pip install --no-cache-dir -r requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyvips[binary]"
          pip install pyinstaller
          pip install --no-cache-dir -r requirements.txt

      - name: Configure GTK Theme
        run: |
          mkdir -p etc/gtk-4.0
          echo "[Settings]" > etc/gtk-4.0/settings.ini
          echo "gtk-theme-name=Windows10" >> etc/gtk-4.0/settings.ini
          echo "gtk-font-name=Segoe UI 9" >> etc/gtk-4.0/settings.ini

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole \
            --add-data "/mingw64/share/glib-2.0/schemas;glib-2.0/schemas" \
            --add-data "/mingw64/share/icons;share/icons" \
            --add-binary "/mingw64/bin/libgtk-4-1.dll;." \
            --hidden-import gi \
            rayforge/app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rayforge-Installer
          path: dist/rayforge.exe
