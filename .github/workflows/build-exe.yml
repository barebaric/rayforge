name: Build Windows Executable
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Set up MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cairo
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-adwaita-icon-theme
            mingw-w64-ucrt-x86_64-gobject-introspection
            mingw-w64-ucrt-x86_64-gobject-introspection-runtime
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-meson

      - name: Set up environment
        shell: msys2 {0}
        run: |
          MSYS2_BASH_PATH=$(echo "${{ steps.msys2.outputs.msys2-location }}" | sed 's|^\([A-Z]\):[/\\]|/d/|g; s|\\|/|g')
          echo "MSYS2_PATH=$MSYS2_BASH_PATH" >> $GITHUB_ENV
          echo "$MSYS2_BASH_PATH/mingw64/bin" >> $GITHUB_PATH
          echo "$MSYS2_BASH_PATH/usr/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$MSYS2_BASH_PATH/mingw64/lib/pkgconfig" >> $GITHUB_ENV
          echo "GI_TYPELIB_PATH=$MSYS2_BASH_PATH/mingw64/lib/girepository-1.0" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$MSYS2_BASH_PATH/mingw64/lib" >> $GITHUB_ENV
          echo "MSYS2_PATH=$MSYS2_BASH_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "PATH=$PATH"
          ls -ld $MSYS2_BASH_PATH || echo "MSYS2 directory not found"
          ls -l $MSYS2_BASH_PATH/mingw64/bin/pkgconf || echo "pkgconf binary not found"
          ls -l $MSYS2_BASH_PATH/usr/bin/pacman || echo "pacman binary not found"
          ls -l $MSYS2_BASH_PATH/mingw64/bin/python || echo "python binary not found"
          pkgconf --version || echo "pkgconf not found"
          pacman --version || echo "pacman not found"
          gcc --version || echo "gcc not found"
          python --version || echo "python not found"
          which pkgconf || echo "pkgconf not in PATH"
          which pkg-config || echo "pkg-config not in PATH"
          which gcc || echo "gcc not in PATH"
          which python || echo "python not in PATH"

      - name: Debug MSYS2 packages
        shell: msys2 {0}
        run: |
          pacman -Q | grep -E 'pkgconf|gobject-introspection|python|meson' || echo "Failed to list pkgconf, gobject-introspection, python, or meson packages"

      - name: Verify pkg-config and dependencies
        shell: msys2 {0}
        env:
          PKG_CONFIG_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/pkgconfig
          GI_TYPELIB_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/girepository-1.0
          LD_LIBRARY_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib
        run: |
          pkgconf --modversion gobject-introspection-1.0 || echo "Failed to find gobject-introspection-1.0"
          pkgconf --list-all | grep gobject-introspection || echo "gobject-introspection not in pkg-config list"

      - name: Install Python dependencies
        shell: msys2 {0}
        env:
          PKG_CONFIG_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/pkgconfig
          GI_TYPELIB_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/girepository-1.0
          LD_LIBRARY_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyvips[binary] pyinstaller
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Configure GTK Theme
        shell: msys2 {0}
        run: |
          mkdir -p etc/gtk-4.0
          echo "[Settings]" > etc/gtk-4.0/settings.ini
          echo "gtk-theme-name=Windows10" >> etc/gtk-4.0/settings.ini
          echo "gtk-font-name=Segoe UI 9" >> etc/gtk-4.0/settings.ini

      - name: Build with PyInstaller
        shell: msys2 {0}
        env:
          MSYS2_PATH: ${{ env.MSYS2_PATH }}
          PKG_CONFIG_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/pkgconfig
          GI_TYPELIB_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib/girepository-1.0
          LD_LIBRARY_PATH: ${{ env.MSYS2_PATH }}/mingw64/lib
        run: |
          pyinstaller --onefile --noconsole \
            --add-data "${{ env.MSYS2_PATH }}/mingw64/share/glib-2.0/schemas;glib-2.0/schemas" \
            --add-data "${{ env.MSYS2_PATH }}/mingw64/share/icons;share/icons" \
            --add-binary "${{ env.MSYS2_PATH }}/mingw64/bin/libgtk-4-1.dll;." \
            --add-binary "${{ env.MSYS2_PATH }}/mingw64/bin/libgobject-2.0-0.dll;." \
            --hidden-import gi \
            rayforge/app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rayforge-Installer
          path: dist/rayforge.exe
