api_version: 1
device:
  name: Longer Ray5 20W
  description: Diode laser engraver with 375x375mm work area and touchscreen display
machine:
  driver: GrblSerialDriver
  driver_args:
    baudrate: '115200'
  gcode_precision: 3
  axis_extents:
  - 375.0
  - 375.0
  origin: bottom_left
  max_travel_speed: 10000
  max_cut_speed: 3000
  home_on_start: true
  heads:
  - max_power: 1000
    frame_power_percent: 1.0
    focus_power_percent: 1.0
    spot_size_mm:
    - 0.08
    - 0.08
