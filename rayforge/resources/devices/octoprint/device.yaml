api_version: 1
device:
  name: OctoPrint
  description: A laser connected through an OctoPrint server
machine:
  driver: OctoPrintDriver
  gcode_precision: 3
  axis_extents: [220.0, 220.0]
  origin: bottom_left
  max_travel_speed: 3000
  max_cut_speed: 1000
  home_on_start: true
  heads:
    - max_power: 1000
      frame_power_percent: 1.0
      focus_power_percent: 1.0
      spot_size_mm: [0.1, 0.1]
