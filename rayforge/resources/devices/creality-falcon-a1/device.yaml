api_version: 1
device:
  name: Creality Falcon A1
machine:
  driver: GrblSerialDriver
  driver_args:
    baudrate: '115200'
    poll_status_while_running: false
  gcode_precision: 3
  supports_arcs: true
  axis_extents:
  - 381.0
  - 305.0
  origin: bottom_left
  max_travel_speed: 3000
  max_cut_speed: 1000
  home_on_start: false
  rotary_enabled_default: false
  rotary_modules:
  - name: Creality Roller Rotary
    axis: A
    mode: axis_replacement
    rotary_type: rollers
    roller_diameter: 36.0
    max_workpiece_length: 300.0
    model_path: creality-roller.glb
  heads:
  - max_power: 1000
    frame_power_percent: 0.1
    spot_size_mm:
    - 0.1
    - 0.1
