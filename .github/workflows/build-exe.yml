name: Build Windows Executable
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Set up MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cairo
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-adwaita-icon-theme
            mingw-w64-ucrt-x86_64-gobject-introspection
            mingw-w64-ucrt-x86_64-gobject-introspection-runtime

      - name: Set up environment
        shell: bash
        run: |
          echo "MSYS2_PATH=${{ steps.msys2.outputs.msys2-location }}" >> $GITHUB_ENV
          echo "${{ steps.msys2.outputs.msys2-location }}/mingw64/bin" >> $GITHUB_PATH
          echo $MSYS2_PATH

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyvips[binary] pyinstaller
          pip install --no-cache-dir -r requirements.txt

      - name: Configure GTK Theme
        shell: bash
        run: |
          mkdir -p etc/gtk-4.0
          echo "[Settings]" > etc/gtk-4.0/settings.ini
          echo "gtk-theme-name=Windows10" >> etc/gtk-4.0/settings.ini
          echo "gtk-font-name=Segoe UI 9" >> etc/gtk-4.0/settings.ini

      - name: Build with PyInstaller
        env:
          MSYS2_PATH: ${{ steps.msys2.outputs.msys2-location }}
          PKG_CONFIG_PATH: ${{ steps.msys2.outputs.msys2-location }}/mingw64/lib/pkgconfig
        shell: bash
        run: |
          pyinstaller --onefile --noconsole \
            --add-data "${{ steps.msys2.outputs.msys2-location }}/mingw64/share/glib-2.0/schemas;glib-2.0/schemas" \
            --add-data "${{ steps.msys2.outputs.msys2-location }}/mingw64/share/icons;share/icons" \
            --add-binary "${{ steps.msys2.outputs.msys2-location }}/mingw64/bin/libgtk-4-1.dll;." \
            --add-binary "${{ steps.msys2.outputs.msys2-location }}/mingw64/bin/libgobject-2.0-0.dll;." \
            --hidden-import gi \
            rayforge/app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rayforge-Installer
          path: dist/rayforge.exe
