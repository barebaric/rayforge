api_version: 1
device:
  name: Elidor Z6
  vendor: Elidor
  model: Z6
  description: Diode laser engraver with 300x300mm work area
  driver: GrblSerialDriver
  driver_args:
    baudrate: '115200'
    poll_status_while_running: false
  driver_config:
    rx_buffer_size: 31
  gcode_precision: 3
  axis_extents:
  - 300.0
  - 300.0
  origin: bottom_left
  max_travel_speed: 3000
  max_cut_speed: 2000
  home_on_start: true
  heads:
  - laser_type: diode
    max_power: 1000
    frame_power_percent: 1.0
    focus_power_percent: 0.3
    spot_size_mm:
    - 0.13
    - 0.13
